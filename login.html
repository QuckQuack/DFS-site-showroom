<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.10/htmx.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>

nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 120ms ease;
}

.nav-links a:hover { color: var(--text); }
.nav-links a.active { color: var(--accent); }



    
    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #e8ff47;
      --danger: #ff4757;
      --success: #2ecc71;
      --text: #e8e8f0;
      --text-muted: #7a7a8e;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 120ms ease;
}

.nav-links a:hover { color: var(--text); }
.nav-links a.active { color: var(--accent); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 48px 40px;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .wordmark span {
      color: var(--accent);
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
      font-weight: 300;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 140ms ease;
      border-radius: 2px;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #3a3a4e;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0f0f11;
      border: none;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 140ms ease, transform 100ms ease;
      border-radius: 2px;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: translateY(1px); }

    .btn.htmx-request {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #login-error {
      margin-top: 16px;
      min-height: 0;
    }

    .error-msg {
      background: rgba(255,71,87,0.08);
      border: 1px solid rgba(255,71,87,0.3);
      color: var(--danger);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 2px;
    }

    .footer-link {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
  <div class="wordmark"><span>//</span> TeamPortal</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html">Sign in</a></li>
  </ul>
</nav>

  <div class="card">
    <div class="wordmark"><span>//</span> TeamPortal</div>
    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to continue.</p>

    <form
      hx-post="login.html"
      hx-target="#login-error"
      hx-swap="innerHTML"
    >
      <div class="field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="your.username"
          autocomplete="username"
          required
        >
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn">Sign in</button>
    </form>

    <div id="login-error"></div>

    <div class="footer-link">
      No account? <a href="register.html">Request access</a>
    </div>
  </div>
</body>
</html>
