<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Pending</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --border: #2e2e38;
      --accent: #e8ff47;
      --warning: #f39c12;
      --text: #e8e8f0;
      --text-muted: #7a7a8e;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 56px 48px;
      position: relative;
      text-align: center;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--warning);
    }

    .icon {
      width: 64px;
      height: 64px;
      border: 2px solid rgba(243,156,18,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      background: rgba(243,156,18,0.06);
    }

    .icon svg {
      width: 28px;
      height: 28px;
      color: var(--warning);
    }

    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--warning);
      background: rgba(243,156,18,0.1);
      border: 1px solid rgba(243,156,18,0.25);
      padding: 4px 10px;
      margin-bottom: 20px;
      border-radius: 2px;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
      font-weight: 300;
      max-width: 320px;
      margin: 0 auto 32px;
    }

    .detail {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      padding: 16px 20px;
      text-align: left;
      line-height: 2;
      border-radius: 2px;
    }

    .detail .key { color: var(--text-muted); }
    .detail .val { color: var(--text); float: right; }

    .back {
      display: inline-block;
      margin-top: 28px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
    }

    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
    </div>

    <div class="tag">Pending review</div>

    <h1>You're on the waitlist</h1>

    <p>Your account request has been received and is awaiting admin approval. You'll be able to sign in once approved.</p>

    <div class="detail">
      <span class="key">Status</span><span class="val">Awaiting approval</span><br>
      <span class="key">Next step</span><span class="val">Admin review</span><br>
      <span class="key">Notification</span><span class="val">Via email</span>
    </div>

    <a href="/login" class="back">← Back to sign in</a>
  </div>
</body>
</html>
